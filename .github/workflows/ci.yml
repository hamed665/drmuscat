name: DrKhaleej CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable corepack
        run: corepack enable
      - name: Prepare pnpm 10.22.0
        run: corepack prepare pnpm@10.22.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: SEO diagnostic admin chain
        continue-on-error: true
        run: >-
          node scripts/seo-check.mjs &&
          node scripts/seo/check-public-route-contract.mjs &&
          node scripts/seo/check-public-text-contract.mjs &&
          pnpm admin:draft-verification-guard:validate &&
          pnpm admin:role-runtime-guard:validate &&
          pnpm admin:location-contract:validate &&
          pnpm admin:location-create-runtime:validate &&
          pnpm admin:location-edit-runtime:validate &&
          pnpm admin:location-primary-runtime:validate &&
          pnpm admin:location-review-contract:validate &&
          pnpm admin:location-review-runtime:validate &&
          pnpm admin:location-review-ui:validate &&
          pnpm admin:server-action-type-boundary:validate &&
          pnpm admin:quality-internal-gate:validate &&
          pnpm admin:contact-visibility-contract:validate &&
          pnpm admin:contact-review-guard:validate &&
          pnpm admin:provider-publication-contract:validate &&
          pnpm admin:final-chain:validate &&
          pnpm admin:launch-checklist:validate &&
          pnpm admin:post-activation:validate &&
          pnpm admin:provider-view-contract:validate &&
          pnpm admin:active-centers-readonly:validate &&
          pnpm admin:audit-log-readonly:validate &&
          pnpm admin:final-launch-recap:validate &&
          pnpm admin:final-route-sanity:validate &&
          pnpm admin:soft-launch-checklist:validate &&
          pnpm admin:r1:validate &&
          pnpm admin:readiness-bundle:validate &&
          pnpm admin:cw:validate &&
          pnpm admin:fo:validate &&
          pnpm admin:gng:validate &&
          pnpm admin:fpi:validate &&
          pnpm admin:w:validate &&
          pnpm admin:av:validate
      - name: SEO diagnostic import chain
        continue-on-error: true
        run: >-
          pnpm seo:public-catalog-eligibility:validate &&
          pnpm seo:public-listing-card-safety:validate &&
          pnpm seo:public-launch-safe-ui:validate &&
          pnpm seo:drkhaleej-brand:validate &&
          pnpm seo:static-readiness:validate &&
          pnpm seo:route-snapshot:validate &&
          pnpm import:templates:validate &&
          pnpm import:alias-coverage:validate &&
          pnpm import:publish-readiness-audit:validate &&
          pnpm import:sitemap-family-caps:validate &&
          pnpm import:profile-smoke:validate &&
          pnpm import:batch-rehearsal:validate &&
          pnpm import:batch-dry-run:validate &&
          pnpm import:first-batch-manifest:validate &&
          pnpm import:first-batch-selection:validate &&
          pnpm import:first-batch-report-bridge:validate &&
          pnpm import:pharmacy-profile-guard:validate &&
          pnpm import:pharmacy-profile-route:validate &&
          pnpm import:pharmacy-sitemap:validate &&
          pnpm import:hospital-profile-guard:validate &&
          pnpm import:hospital-profile-route:validate &&
          pnpm import:hospital-sitemap:validate
      - name: SEO diagnostic geo chain
        continue-on-error: true
        run: >-
          pnpm seo:cleaned-public-source-brand:validate &&
          pnpm seo:geo:sitemap-exclusion &&
          pnpm seo:canonical-geo-contract:validate &&
          pnpm seo:location-path-helper:validate &&
          pnpm seo:legacy-geo-compat:validate &&
          pnpm seo:location-metadata:validate &&
          pnpm seo:location-breadcrumb:validate &&
          pnpm seo:location-registry-readiness:validate &&
          pnpm seo:location-links:validate &&
          pnpm seo:location-category-candidates:validate &&
          pnpm seo:location-thresholds:validate &&
          pnpm seo:location-candidate-runtime:validate &&
          pnpm seo:location-candidate-paths:validate &&
          pnpm seo:location-candidate-path-integration:validate &&
          pnpm seo:location-candidate-evidence-snapshot:validate &&
          pnpm seo:location-candidate-evidence-runtime:validate &&
          pnpm seo:location-candidate-evidence-integration:validate &&
          pnpm seo:location-candidate-promotion-checklist:validate &&
          pnpm seo:location-candidate-promotion-runtime:validate &&
          pnpm seo:location-candidate-promotion-integration:validate &&
          pnpm seo:location-candidate-route-readiness-final:validate &&
          pnpm seo:location-candidate-data-readiness:validate &&
          pnpm seo:location-candidate-data-readiness-runtime:validate &&
          pnpm seo:location-candidate-data-readiness-integration:validate &&
          pnpm seo:location-candidate-source-model:validate &&
          pnpm seo:location-candidate-source-model-runtime:validate &&
          pnpm seo:location-candidate-source-model-integration:validate &&
          pnpm seo:location-candidate-verified-count-method:validate &&
          pnpm seo:location-candidate-manual-gate-integration:validate &&
          pnpm seo:location-v2-status-doc:validate &&
          pnpm seo:entity-relation-gap:validate
