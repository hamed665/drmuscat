name: DrKhaleej CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm 10.22.0
        run: corepack prepare pnpm@10.22.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Routes check
        run: pnpm routes:check

      - name: Env check
        run: pnpm env:check

      - name: Validate migrations
        run: pnpm db:validate:migrations

      - name: Validate seeds
        run: pnpm db:validate:seeds

      - name: Validate Iran geo import contract
        run: pnpm geo:validate:iran-import

      - name: Validate Oman geo guardrails
        run: pnpm geo:check:oman

      - name: Validate SEO market gate
        run: pnpm seo:market-gate

      - name: Static RLS tests
        run: pnpm test:db:rls

      - name: Static seed tests
        run: pnpm test:db:seed

      - name: SEO base diagnostics
        run: |
          node scripts/seo-check.mjs
          node scripts/seo/check-public-route-contract.mjs
          node scripts/seo/check-public-text-contract.mjs

      - name: Public SEO diagnostics
        run: |
          pnpm seo:public-catalog-eligibility:validate
          pnpm seo:public-listing-card-safety:validate
          pnpm seo:public-launch-safe-ui:validate
          pnpm seo:drkhaleej-brand:validate
          pnpm seo:cleaned-public-source-brand:validate

      - name: Launch surface diagnostics
        run: |
          pnpm admin:provider-view-contract:validate
          pnpm admin:final-route-sanity:validate
          pnpm import:profile-smoke:validate
          pnpm import:pharmacy-profile-route:validate
          pnpm import:hospital-profile-route:validate

      - name: SEO check
        run: pnpm seo:check
