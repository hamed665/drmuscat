name: Cleanup Validator

on:
  push:
    branches:
      - agent/pharmacy-authorization-invalidation-readback

permissions:
  contents: write

jobs:
  cleanup-validator:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pharmacy-authorization-invalidation-readback
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Remove duplicate lifecycle registrations
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/db/validate-migrations-current.mjs')
          lines = p.read_text().splitlines()
          out = []
          for line in lines:
            if out and line == out[-1] and 'pharmacyAuthorizationLifecycle' in line:
              continue
            out.append(line)
          p.write_text('\n'.join(out) + '\n')
          PY
      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/db/validate-migrations-current.mjs
          git diff --cached --quiet && exit 0
          git commit -m "test: deduplicate lifecycle migration registration"
          git push origin HEAD:agent/pharmacy-authorization-invalidation-readback
