name: Debug SEO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  seo-diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.22.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Capture SEO output
        shell: bash
        run: |
          set +e
          pnpm seo:check > seo-check.log 2>&1
          status=$?
          cat seo-check.log
          echo "SEO_EXIT=$status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: seo-diagnostics
          path: seo-check.log
          if-no-files-found: error
      - name: Preserve failure status
        run: exit "$SEO_EXIT"
