name: Debug Static RLS
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.22.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Run static RLS only
        run: node scripts/db/test-rls-static-taxrlsa.mjs
