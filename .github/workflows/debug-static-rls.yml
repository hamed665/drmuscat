name: Debug Static RLS
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run static RLS only
        id: rls
        shell: bash
        run: |
          set +e
          node scripts/db/test-rls-static-taxrlsa.mjs > static-rls.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: static-rls-log
          path: static-rls.log
      - name: Fail if validation failed
        run: exit "${{ steps.rls.outputs.status }}"
