name: Debug Static RLS
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run static RLS only
        shell: bash
        run: |
          set +e
          node scripts/db/test-rls-static-taxrlsa.mjs > /tmp/static-rls.log 2>&1
          status=$?
          tac /tmp/static-rls.log | head -n 80
          exit $status
