name: Import Readiness Contract

on:
  pull_request:
    paths:
      - "docs/import/**"
      - "fixtures/import/**"
      - "scripts/import/**"
      - "src/app/**/hospitals/**"
      - "src/server/public/import-sitemap.ts"
      - ".github/workflows/import-readiness-contract.yml"
  push:
    branches:
      - main
    paths:
      - "docs/import/**"
      - "fixtures/import/**"
      - "scripts/import/**"
      - "src/app/**/hospitals/**"
      - "src/server/public/import-sitemap.ts"
      - ".github/workflows/import-readiness-contract.yml"

jobs:
  import-readiness-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check imported hospital public hold
        run: node scripts/import/check-imported-hospital-public-hold.mjs

      - name: Check first batch dry-run fixture
        run: node scripts/import/check-first-batch-real-fixture.mjs

      - name: Check generated first batch dry-run fixture
        run: node scripts/import/generate-first-batch-dry-run-fixture.mjs --check

      - name: Check first batch generator bridge alignment
        run: node scripts/import/check-first-batch-generator-bridge-alignment.mjs

      - name: Check import public release preflight
        run: node scripts/import/check-import-public-release-preflight-contract.mjs
