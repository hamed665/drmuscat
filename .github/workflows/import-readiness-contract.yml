name: Import Readiness Contract

on:
  pull_request:
    paths:
      - "docs/import/**"
      - "fixtures/import/**"
      - "scripts/import/**"
      - "src/app/**/hospitals/**"
      - "src/server/public/import-sitemap.ts"
      - ".github/workflows/import-readiness-contract.yml"
  push:
    branches:
      - main
    paths:
      - "docs/import/**"
      - "fixtures/import/**"
      - "scripts/import/**"
      - "src/app/**/hospitals/**"
      - "src/server/public/import-sitemap.ts"
      - ".github/workflows/import-readiness-contract.yml"

jobs:
  import-readiness-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run import readiness contract
        shell: bash
        run: |
          set -o pipefail
          node scripts/import/run-import-readiness.mjs 2>&1 | tee import-readiness-contract.log

      - name: Upload import readiness failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: import-readiness-contract-log
          path: import-readiness-contract.log
          if-no-files-found: ignore
