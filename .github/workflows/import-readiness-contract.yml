name: Import Readiness Contract

on:
  pull_request:
    paths:
      - "docs/import/**"
      - "fixtures/import/**"
      - "scripts/import/**"
      - "src/app/**/hospitals/**"
      - "src/server/public/import-sitemap.ts"
      - ".github/workflows/import-readiness-contract.yml"
  push:
    branches:
      - main
    paths:
      - "docs/import/**"
      - "fixtures/import/**"
      - "scripts/import/**"
      - "src/app/**/hospitals/**"
      - "src/server/public/import-sitemap.ts"
      - ".github/workflows/import-readiness-contract.yml"

jobs:
  import-readiness-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge commit
        run: |
          git init . --quiet
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --quiet --depth=1 origin "$GITHUB_SHA"
          git checkout --quiet FETCH_HEAD

      - name: Run import readiness contract
        run: node scripts/import/run-import-readiness.mjs
