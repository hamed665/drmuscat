name: Import Runner Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-import-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate first-batch dry-run runner
        run: node scripts/import/check-first-batch-dry-run-runner.mjs
      - name: Validate first-batch CSV transformer
        run: node scripts/import/check-first-batch-csv-transformer.mjs
