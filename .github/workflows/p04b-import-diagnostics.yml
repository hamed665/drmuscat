name: P04-B import diagnostics

on:
  pull_request:
    paths:
      - .github/workflows/p04b-import-diagnostics.yml
      - scripts/import/check-import-verified-reservation-handoff.mjs
      - docs/import/VERIFIED_RESERVATION_HANDOFF.md

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture import readiness audit
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/p04b
          pnpm import:publish-readiness-audit:validate 2>&1 | tee artifacts/p04b/import-audit.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p04b-import-diagnostics-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/p04b/import-audit.log
          if-no-files-found: error
          retention-days: 2
