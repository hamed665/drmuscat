name: P04-B SEO diagnostics

on:
  push:
    branches:
      - agent/verified-reservation-handoff-p04b
    paths:
      - .github/workflows/p04b-seo-diagnostics.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/verified-reservation-handoff-p04b

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture SEO chain
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/p04b
          pnpm seo:check 2>&1 | tee artifacts/p04b/seo-check.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p04b-seo-diagnostics-${{ github.sha }}
          path: artifacts/p04b/seo-check.log
          if-no-files-found: error
          retention-days: 2
