name: P05 apply Admin action wiring

on:
  push:
    branches:
      - agent/private-admin-wiring-p05
    paths:
      - .github/workflows/p05-apply-admin-action-wiring.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/private-admin-wiring-p05
      - name: Apply exact P05 action wiring
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/app/admin/imports/readiness/actions.ts')
          source = path.read_text()

          import_anchor = '''import {
            createPharmacyPrivateAdminServerAction,
            type PharmacyPrivateAdminServerActionResult,
          } from "@/server/admin/import-pharmacy-private-admin-server-action";
          '''
          import_addition = '''import {
            createPharmacyPrivateAdminPublishOperationDependenciesFromEnvironment,
            runPharmacyPrivateAdminPublishOperation,
          } from "@/server/admin/import-pharmacy-private-admin-publish-operation";
          '''
          if import_addition not in source:
              if source.count(import_anchor) != 1:
                  raise SystemExit('P05 action import anchor mismatch')
              source = source.replace(import_anchor, import_anchor + import_addition, 1)

          old_enabled = 'const IMPORT_PHARMACY_PRIVATE_ADMIN_ENABLED_OPERATIONS = ["dry_run", "review", "reserve_private_publish"] as const;'
          new_enabled = 'const IMPORT_PHARMACY_PRIVATE_ADMIN_ENABLED_OPERATIONS = ["dry_run", "review", "reserve_private_publish", "private_publish"] as const;'
          if source.count(old_enabled) != 1:
              raise SystemExit('P05 enabled operation anchor mismatch')
          source = source.replace(old_enabled, new_enabled, 1)

          old_guard = 'if (operation !== "dry_run" && operation !== "review" && operation !== "reserve_private_publish") {'
          new_guard = 'if (operation !== "dry_run" && operation !== "review" && operation !== "reserve_private_publish" && operation !== "private_publish") {'
          if source.count(old_guard) != 1:
              raise SystemExit('P05 operation guard anchor mismatch')
          source = source.replace(old_guard, new_guard, 1)

          reserve_anchor = '''      if (operation === "reserve_private_publish") {
          const now = new Date().toISOString();
          '''
          private_branch = '''      if (operation === "private_publish") {
            const dependencies = createPharmacyPrivateAdminPublishOperationDependenciesFromEnvironment({
              allowedActorIds,
              allowedEntityIds,
            });
            const published = dependencies
              ? await runPharmacyPrivateAdminPublishOperation({
                  environment: process.env.VERCEL_ENV,
                  actorId,
                  entityId,
                  allowedActorIds,
                  allowedEntityIds,
                  confirmation: confirmation ?? "",
                  now: new Date().toISOString(),
                  dependencies,
                })
              : null;
            return {
              operation,
              status: published?.published ? "completed" : "failed",
              entityId,
              blockers: published?.blocker ? ["readiness_blocked"] : [],
              publicVisibility: "private",
              indexEligible: false,
              sitemapEligible: false,
              routeEnabled: false,
              executionReference: published?.executionReference ?? null,
            };
          }

          '''
          if private_branch not in source:
              if source.count(reserve_anchor) != 1:
                  raise SystemExit('P05 reserve branch anchor mismatch')
              source = source.replace(reserve_anchor, private_branch + reserve_anchor, 1)

          path.write_text(source)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/p05-apply-admin-action-wiring.yml
          git add src/app/admin/imports/readiness/actions.ts
          git commit -m "feat(p05): enable exact private publish Admin operation"
          git push origin HEAD:agent/private-admin-wiring-p05
