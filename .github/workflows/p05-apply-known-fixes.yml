name: P05 apply known fixes

on:
  push:
    branches:
      - agent/private-admin-wiring-p05
    paths:
      - .github/workflows/p05-apply-known-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/private-admin-wiring-p05
          fetch-depth: 1

      - name: Apply exact fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old!r}')
              p.write_text(text.replace(old, new, 1))

          # Vitest must mock the server-only marker before importing the verifier.
          replace_once(
              'src/server/admin/import-pharmacy-private-publish-readback.test.ts',
              'import { describe, expect, it } from "vitest";\n\n',
              'import { describe, expect, it, vi } from "vitest";\n\nvi.mock("server-only", () => ({}));\n\n',
          )

          # The canonical patch normalizes source evidence before it reaches persistence/readback.
          replace_once(
              'src/server/admin/import-pharmacy-private-admin-publish-executor.test.ts',
              'sourceEvidence: { sourceId: "source-1" },\n        rawPayloadHash: null,',
              'sourceEvidence: {\n          source: "manual",\n          sourceId: "source-1",\n          sourceName: null,\n          importedBy: null,\n          importedAt: null,\n        },\n        rawPayloadHash: null,',
          )

          # A private-publish request without exactly one entity cannot satisfy entity-bound confirmation.
          replace_once(
              'src/server/admin/import-pharmacy-private-admin-workflow.ts',
              '    input.operation === "private_publish" &&\n    entityId !== null &&\n    input.confirmation !== `EXECUTE PRIVATE PUBLISH ${entityId}`\n  ) blockers.push("missing_confirmation");',
              '    input.operation === "private_publish" &&\n    (entityId === null || input.confirmation !== `EXECUTE PRIVATE PUBLISH ${entityId}`)\n  ) blockers.push("missing_confirmation");',
          )

          # Keep focused tests aligned with the entity-bound confirmation contract.
          for path in [
              'src/server/admin/import-pharmacy-private-admin-runtime-executor.test.ts',
              'src/server/admin/import-pharmacy-real-preview-canary.test.ts',
          ]:
              p = Path(path)
              text = p.read_text()
              if 'PUBLISH PRIVATE PHARMACY' not in text:
                  raise SystemExit(f'{path}: legacy confirmation token missing')
              p.write_text(text.replace('PUBLISH PRIVATE PHARMACY', 'EXECUTE PRIVATE PUBLISH pharmacy-1'))

          replace_once(
              'scripts/import/check-import-pharmacy-real-preview-canary.mjs',
              "  [/PUBLISH PRIVATE PHARMACY/, 'runner must use the exact private publish confirmation.'],",
              "  [/EXECUTE PRIVATE PUBLISH/, 'runner must use the exact entity-bound private publish confirmation.'],",
          )

          # Register additive migration 0082 with the current migration validator while preserving legacy inventory checks.
          migration = 'scripts/db/validate-migrations-current.mjs'
          replace_once(
              migration,
              "const pharmacyReservationAuditSplitMigrationName = '0081_import_pharmacy_reservation_audit_split.sql';\n",
              "const pharmacyReservationAuditSplitMigrationName = '0081_import_pharmacy_reservation_audit_split.sql';\nconst pharmacyPrivateExecutionAuditMigrationName = '0082_import_pharmacy_private_execution_audit.sql';\n",
          )
          replace_once(
              migration,
              "const pharmacyReservationAuditSplitMigrationPath = path.join(migrationsDir, pharmacyReservationAuditSplitMigrationName);\n",
              "const pharmacyReservationAuditSplitMigrationPath = path.join(migrationsDir, pharmacyReservationAuditSplitMigrationName);\nconst pharmacyPrivateExecutionAuditMigrationPath = path.join(migrationsDir, pharmacyPrivateExecutionAuditMigrationName);\n",
          )
          replace_once(
              migration,
              "const hiddenPharmacyReservationAuditSplitMigrationPath = path.join(migrationsDir, `.pharmacy-reservation-audit-split-${pharmacyReservationAuditSplitMigrationName}.hidden`);\n",
              "const hiddenPharmacyReservationAuditSplitMigrationPath = path.join(migrationsDir, `.pharmacy-reservation-audit-split-${pharmacyReservationAuditSplitMigrationName}.hidden`);\nconst hiddenPharmacyPrivateExecutionAuditMigrationPath = path.join(migrationsDir, `.pharmacy-private-execution-audit-${pharmacyPrivateExecutionAuditMigrationName}.hidden`);\n",
          )
          replace_once(
              migration,
              "  [pharmacyReservationAuditSplitMigrationName, pharmacyReservationAuditSplitMigrationPath, hiddenPharmacyReservationAuditSplitMigrationPath],\n];",
              "  [pharmacyReservationAuditSplitMigrationName, pharmacyReservationAuditSplitMigrationPath, hiddenPharmacyReservationAuditSplitMigrationPath],\n  [pharmacyPrivateExecutionAuditMigrationName, pharmacyPrivateExecutionAuditMigrationPath, hiddenPharmacyPrivateExecutionAuditMigrationPath],\n];",
          )
          replace_once(
              migration,
              "function validatePharmacyPublishRpcMigration() {\n  requireCondition(existsSync(pharmacyPublishRpcMigrationPath), `${pharmacyPublishRpcMigrationName} is missing.`);\n  execFileSync(process.execPath, [pharmacyPublishRpcValidator], { cwd: repoRoot, stdio: 'inherit' });\n}",
              "function validatePharmacyPublishRpcMigration() {\n  requireCondition(existsSync(pharmacyPublishRpcMigrationPath), `${pharmacyPublishRpcMigrationName} is missing.`);\n  requireCondition(existsSync(pharmacyPrivateExecutionAuditMigrationPath), `${pharmacyPrivateExecutionAuditMigrationName} is missing.`);\n  execFileSync(process.execPath, [pharmacyPublishRpcValidator], { cwd: repoRoot, stdio: 'inherit' });\n}",
          )
          PY

      - name: Commit fixes and remove temporary workflows
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/p05-apply-known-fixes.yml
          git rm -f .github/workflows/p05-failure-diagnostics.yml .github/workflows/p05-typecheck-diagnostics.yml
          git add \
            scripts/db/validate-migrations-current.mjs \
            scripts/import/check-import-pharmacy-real-preview-canary.mjs \
            src/server/admin/import-pharmacy-private-publish-readback.test.ts \
            src/server/admin/import-pharmacy-private-admin-publish-executor.test.ts \
            src/server/admin/import-pharmacy-private-admin-workflow.ts \
            src/server/admin/import-pharmacy-private-admin-runtime-executor.test.ts \
            src/server/admin/import-pharmacy-real-preview-canary.test.ts
          git commit -m "fix(p05): align publish confirmation and migration validation"
          git push origin HEAD:agent/private-admin-wiring-p05
