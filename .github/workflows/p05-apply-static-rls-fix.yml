name: P05 apply static RLS fix

on:
  push:
    branches:
      - agent/private-admin-wiring-p05
    paths:
      - .github/workflows/p05-apply-static-rls-fix.yml

permissions:
  contents: write

concurrency:
  group: p05-one-shot-branch-write
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/private-admin-wiring-p05
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Replace stale DROP-based 0082 contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/db/test-rls-static-taxrlsa.mjs')
          source = path.read_text()
          old = """  requirePattern(privateExecution, /drop\\s+function\\s+if\\s+exists\\s+public\\.import_publish_pharmacy_private[\\s\\S]*uuid\\s*,\\s*uuid\\s*,\\s*uuid\\s*,\\s*uuid\\s*,\\s*uuid\\s*,\\s*text\\s*,\\s*jsonb\\s*,\\s*text[\\s\\S]*\\)\\s*;/i, '0082 must atomically replace only the exact existing function signature.');
  forbidPattern(privateExecution, /drop\\s+(table|schema|type|database)\\b/i, '0082 must not drop data-bearing or namespace objects.');
  forbidPattern(privateExecution, /drop\\s+function[\\s\\S]*cascade/i, '0082 function replacement must not cascade.');
"""
          new = """  requirePattern(privateExecution, /p_execution_started_audit_id\\s+uuid/i, '0082 must retain the existing PostgreSQL input parameter identity.');
  requirePattern(privateExecution, /legacy[\\s\\S]*parameter name[\\s\\S]*verified reservation audit id/i, '0082 must document the compatible Reservation audit parameter semantics.');
  forbidPattern(privateExecution, /drop\\s+(function|table|schema|type|database)\\b/i, '0082 must replace the RPC without dropping database objects.');
"""
          if source.count(old) != 1:
              raise SystemExit('0082 static RLS contract anchor mismatch')
          path.write_text(source.replace(old, new, 1))
          PY
          pnpm test:db:rls
      - name: Commit and self-remove
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/p05-apply-static-rls-fix.yml
          git add scripts/db/test-rls-static-taxrlsa.mjs
          git commit -m "test(p05): validate compatible RPC replacement"
          git push origin HEAD:agent/private-admin-wiring-p05
