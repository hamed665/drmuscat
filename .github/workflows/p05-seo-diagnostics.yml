name: P05 SEO Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/p05-seo-diagnostics.yml'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/import/**'
      - 'docs/project-state/**'
      - 'scripts/import/**'
      - 'src/server/admin/import-pharmacy-**'
      - 'supabase/migrations/0082_import_pharmacy_private_execution_audit.sql'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable corepack
        run: corepack enable
      - name: Prepare pnpm
        run: corepack prepare pnpm@10.22.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --silent
      - name: Capture SEO diagnostic
        shell: bash
        run: |
          mkdir -p artifacts/p05-seo
          set +e
          pnpm seo:check > artifacts/p05-seo/seo.log 2>&1
          status=$?
          set -e
          printf '%s\n' "${status}" > artifacts/p05-seo/exit-code.txt
          tail -n 20 artifacts/p05-seo/seo.log || true
      - name: Upload SEO diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p05-seo-diagnostic-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/p05-seo
          if-no-files-found: error
          retention-days: 2
      - name: Enforce SEO result
        shell: bash
        run: |
          status="$(cat artifacts/p05-seo/exit-code.txt)"
          if [ "${status}" -ne 0 ]; then
            echo "SEO diagnostic failed; inspect the uploaded bounded artifact."
            exit "${status}"
          fi
