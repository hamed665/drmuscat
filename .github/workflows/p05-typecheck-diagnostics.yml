name: P05 typecheck diagnostics

on:
  push:
    branches:
      - agent/private-admin-wiring-p05
    paths:
      - .github/workflows/p05-typecheck-diagnostics.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/private-admin-wiring-p05
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/p05
          pnpm typecheck 2>&1 | tee artifacts/p05/typecheck.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p05-typecheck-${{ github.sha }}
          path: artifacts/p05/typecheck.log
          if-no-files-found: error
          retention-days: 2
