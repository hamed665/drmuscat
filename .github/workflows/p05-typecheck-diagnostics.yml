name: P05 typecheck diagnostics

on:
  pull_request:
    paths:
      - .github/workflows/p05-typecheck-diagnostics.yml
      - src/server/admin/import-pharmacy-private-admin-publish-operation.ts
      - src/server/admin/import-pharmacy-private-admin-publish-executor.ts
      - src/server/admin/import-pharmacy-private-publish-readback.ts
      - src/server/admin/import-supabase-pharmacy-private-publish-readback.ts
      - src/server/admin/import-pharmacy-verified-reservation-loader.ts
      - src/server/admin/import-supabase-pharmacy-verified-reservation-loader.ts
      - src/app/admin/imports/readiness/actions.ts

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/p05
          pnpm typecheck 2>&1 | tee artifacts/p05/typecheck.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p05-typecheck-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/p05/typecheck.log
          if-no-files-found: error
          retention-days: 2
