name: P06 fixture version correction

on:
  push:
    branches:
      - agent/rollback-authority-hardening-p06
    paths:
      - .github/workflows/p06-fix-fixture-version.yml

permissions:
  contents: write

concurrency:
  group: p06-fix-fixture-version
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/rollback-authority-hardening-p06
          fetch-depth: 1
      - name: Remove invalid transaction-stable timestamp assertion
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/import/run-p06-rollback-authority-proof.mjs')
          source = path.read_text()
          target = "    assert(item.currentVersion !== item.originalVersion, 'P06 fixture did not advance the entity version.');\n"
          if source.count(target) != 1:
              raise SystemExit('P06 fixture timestamp assertion not found exactly once')
          path.write_text(source.replace(target, ''))
          PY
          node --check scripts/import/run-p06-rollback-authority-proof.mjs
      - name: Commit correction and remove one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/p06-fix-fixture-version.yml
          git add scripts/import/run-p06-rollback-authority-proof.mjs
          git commit -m "fix(p06): allow transaction-stable fixture version"
          git push origin HEAD:agent/rollback-authority-hardening-p06
