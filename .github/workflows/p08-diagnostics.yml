name: P08 Diagnostics

on:
  push:
    branches:
      - agent/admin-state-machine-p08

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/p08-diagnostics
          pnpm typecheck 2>&1 | tee artifacts/p08-diagnostics/typecheck.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p08-typecheck-${{ github.sha }}
          path: artifacts/p08-diagnostics/
          if-no-files-found: error
          retention-days: 2
