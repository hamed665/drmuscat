name: P08 State Finalizer

on:
  push:
    branches:
      - agent/admin-state-machine-p08
    paths:
      - scripts/import/finalize-p08-state.mjs
      - .github/workflows/p08-state-finalizer.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-state-machine-p08
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply exact P08 alignment
        run: node scripts/import/finalize-p08-state.mjs
      - name: Commit alignment
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "P08 state already aligned."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md README.md docs/import/ADMIN_STATE_MACHINE_SCOPE.md docs/import/import-readiness-roadmap-after-933.md docs/project-state/CURRENT_STATE.md docs/project-state/V10_4_PHASE_ALIGNMENT_MATRIX.md scripts/import/check-import-readiness-state-alignment.mjs scripts/import/test-import-readiness-state-alignment.mjs
          git commit -m "docs(p08): align completed Admin state machine"
          git push origin HEAD:agent/admin-state-machine-p08
