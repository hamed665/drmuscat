name: Patch Validator

on:
  push:
    branches:
      - agent/pharmacy-authorization-invalidation-readback

permissions:
  contents: write

jobs:
  patch-validator:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pharmacy-authorization-invalidation-readback
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch validator registry
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/db/validate-migrations-current.mjs')
          s = p.read_text()
          replacements = [
            (
              "const pharmacyAuthorizationV2Validator = path.join(repoRoot, 'scripts', 'import', 'check-import-pharmacy-authorization-persistence-v2.mjs');",
              "const pharmacyAuthorizationV2Validator = path.join(repoRoot, 'scripts', 'import', 'check-import-pharmacy-authorization-persistence-v2.mjs');\nconst pharmacyAuthorizationLifecycleValidator = path.join(repoRoot, 'scripts', 'import', 'check-import-pharmacy-authorization-invalidation-readback.mjs');",
            ),
            (
              "const pharmacyAuthorizationV2MigrationName = '0077_import_pharmacy_authorization_persistence_v2.sql';",
              "const pharmacyAuthorizationV2MigrationName = '0077_import_pharmacy_authorization_persistence_v2.sql';\nconst pharmacyAuthorizationLifecycleMigrationName = '0078_import_pharmacy_authorization_invalidation_readback.sql';",
            ),
            (
              "const pharmacyAuthorizationV2MigrationPath = path.join(migrationsDir, pharmacyAuthorizationV2MigrationName);",
              "const pharmacyAuthorizationV2MigrationPath = path.join(migrationsDir, pharmacyAuthorizationV2MigrationName);\nconst pharmacyAuthorizationLifecycleMigrationPath = path.join(migrationsDir, pharmacyAuthorizationLifecycleMigrationName);",
            ),
            (
              "const hiddenPharmacyAuthorizationV2MigrationPath = path.join(migrationsDir, `.pharmacy-authorization-v2-${pharmacyAuthorizationV2MigrationName}.hidden`);",
              "const hiddenPharmacyAuthorizationV2MigrationPath = path.join(migrationsDir, `.pharmacy-authorization-v2-${pharmacyAuthorizationV2MigrationName}.hidden`);\nconst hiddenPharmacyAuthorizationLifecycleMigrationPath = path.join(migrationsDir, `.pharmacy-authorization-lifecycle-${pharmacyAuthorizationLifecycleMigrationName}.hidden`);",
            ),
            (
              "  [pharmacyAuthorizationV2MigrationName, pharmacyAuthorizationV2MigrationPath, hiddenPharmacyAuthorizationV2MigrationPath],",
              "  [pharmacyAuthorizationV2MigrationName, pharmacyAuthorizationV2MigrationPath, hiddenPharmacyAuthorizationV2MigrationPath],\n  [pharmacyAuthorizationLifecycleMigrationName, pharmacyAuthorizationLifecycleMigrationPath, hiddenPharmacyAuthorizationLifecycleMigrationPath],",
            ),
            (
              "function validatePharmacyAuthorizationV2Migration() {\n  requireCondition(existsSync(pharmacyAuthorizationV2MigrationPath), `${pharmacyAuthorizationV2MigrationName} is missing.`);\n  execFileSync(process.execPath, [pharmacyAuthorizationV2Validator], { cwd: repoRoot, stdio: 'inherit' });\n}",
              "function validatePharmacyAuthorizationV2Migration() {\n  requireCondition(existsSync(pharmacyAuthorizationV2MigrationPath), `${pharmacyAuthorizationV2MigrationName} is missing.`);\n  execFileSync(process.execPath, [pharmacyAuthorizationV2Validator], { cwd: repoRoot, stdio: 'inherit' });\n}\nfunction validatePharmacyAuthorizationLifecycleMigration() {\n  requireCondition(existsSync(pharmacyAuthorizationLifecycleMigrationPath), `${pharmacyAuthorizationLifecycleMigrationName} is missing.`);\n  execFileSync(process.execPath, [pharmacyAuthorizationLifecycleValidator], { cwd: repoRoot, stdio: 'inherit' });\n}",
            ),
            (
              "validatePharmacyAuthorizationV2Migration();",
              "validatePharmacyAuthorizationV2Migration();\nvalidatePharmacyAuthorizationLifecycleMigration();",
            ),
          ]
          for old, new in replacements:
            if old not in s:
              raise SystemExit(f'missing anchor: {old}')
            s = s.replace(old, new, 1)
          p.write_text(s)
          PY
      - name: Commit validator registration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/db/validate-migrations-current.mjs
          git diff --cached --quiet && exit 0
          git commit -m "test: register authorization lifecycle migration"
          git push origin HEAD:agent/pharmacy-authorization-invalidation-readback
