name: Preview Migration Sync

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/db/preview-migration-sync.mjs'
      - 'scripts/db/run-preview-migration-sync.mjs'
      - '.github/workflows/preview-migration-sync.yml'
      - 'scripts/db/validate-migrations-current.mjs'
      - 'scripts/db/test-rls-static-taxrlsa.mjs'

permissions:
  contents: read

env:
  PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
  PREVIEW_PROJECT_REF: ${{ secrets.PREVIEW_PROJECT_REF }}
  PRODUCTION_PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_REF }}
  PREVIEW_MIGRATION_EVIDENCE_PATH: artifacts/preview-migration-sync/evidence.json

concurrency:
  group: preview-migration-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Record exact revision
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate repository migration contract
        run: |
          pnpm db:validate:migrations
          pnpm test:db:rls

      - name: Fail-closed identity preflight
        run: node scripts/db/preview-migration-sync.mjs preflight

      - name: Apply only missing migrations under advisory lock
        run: node scripts/db/run-preview-migration-sync.mjs

      - name: Verify ledger, gaps, drift inventory, RLS and RPCs
        run: node scripts/db/preview-migration-sync.mjs verify

      - name: Upload red or green exact-SHA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-migration-sync-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/preview-migration-sync/evidence.json
          if-no-files-found: error
          retention-days: 14
