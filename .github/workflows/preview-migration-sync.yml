name: Preview Migration Sync

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/db/preview-migration-sync.mjs'
      - 'scripts/db/run-preview-migration-sync.mjs'
      - 'scripts/import/check-preview-database-url.mjs'
      - 'scripts/import/run-p05-private-publish-proof.mjs'
      - 'scripts/import/check-import-p05-private-publish-proof.mjs'
      - 'scripts/import/run-p06-rollback-authority-proof.mjs'
      - 'scripts/import/check-import-p06-rollback-authority-proof.mjs'
      - 'scripts/import/run-p07-rollback-exact-recovery-proof.mjs'
      - 'scripts/import/check-import-p07-rollback-exact-recovery-proof.mjs'
      - 'scripts/import/run-p09-real-admin-canary.mjs'
      - 'scripts/import/check-import-p09-real-admin-canary.mjs'
      - 'scripts/import/check-import-pharmacy-minimal-admin-ui.mjs'
      - 'src/server/admin/import-pharmacy-rollback-exact-recovery*'
      - 'src/server/admin/import-pharmacy-real-rollback-canary*'
      - 'src/server/admin/import-pharmacy-admin-state-machine*'
      - 'src/server/admin/import-pharmacy-private-admin-rollback-operation*'
      - 'src/server/admin/import-pharmacy-minimal-admin-ui-model.ts'
      - 'src/app/admin/imports/readiness/**'
      - 'src/components/admin/import-pharmacy-private-admin-control-panel.tsx'
      - 'scripts/import/check-import-readiness-state-alignment.mjs'
      - 'docs/import/ROLLBACK_EXACT_RECOVERY.md'
      - 'docs/import/ADMIN_STATE_MACHINE_SCOPE.md'
      - 'docs/import/REAL_ADMIN_CANARY_SCOPE.md'
      - 'docs/import/POST_P09_GO_NO_GO.md'
      - 'docs/import/import-readiness-roadmap-after-933.md'
      - 'docs/project-state/CURRENT_STATE.md'
      - 'docs/project-state/V10_4_PHASE_ALIGNMENT_MATRIX.md'
      - 'README.md'
      - '.github/workflows/preview-migration-sync.yml'
      - 'scripts/db/validate-migrations-current.mjs'
      - 'scripts/db/test-rls-static-taxrlsa.mjs'
      - 'scripts/db/test-rls-static.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'

env:
  PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
  PREVIEW_PROJECT_REF: ${{ secrets.PREVIEW_PROJECT_REF }}
  PRODUCTION_PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_REF }}
  PREVIEW_MIGRATION_EVIDENCE_PATH: artifacts/preview-migration-sync/evidence.json
  PREVIEW_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
  P05_PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
  P05_PREVIEW_PROJECT_REF: ${{ secrets.PREVIEW_PROJECT_REF }}
  P05_PRODUCTION_PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_REF }}
  P05_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
  P05_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.pull_request.head.sha || github.sha }}
  P05_EVIDENCE_PATH: artifacts/p05/private-publish-proof.json
  P06_PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
  P06_PREVIEW_PROJECT_REF: ${{ secrets.PREVIEW_PROJECT_REF }}
  P06_PRODUCTION_PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_REF }}
  P06_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
  P06_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.pull_request.head.sha || github.sha }}
  P06_EVIDENCE_PATH: artifacts/p06/rollback-authority-proof.json
  P07_PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
  P07_PREVIEW_PROJECT_REF: ${{ secrets.PREVIEW_PROJECT_REF }}
  P07_PRODUCTION_PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_REF }}
  P07_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
  P07_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.pull_request.head.sha || github.sha }}
  P07_EVIDENCE_PATH: artifacts/p07/rollback-exact-recovery-proof.json
  P09_PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
  P09_PREVIEW_PROJECT_REF: ${{ secrets.PREVIEW_PROJECT_REF }}
  P09_PRODUCTION_PROJECT_REF: ${{ secrets.PRODUCTION_PROJECT_REF }}
  P09_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
  P09_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.pull_request.head.sha || github.sha }}
  P09_EVIDENCE_PATH: artifacts/p09/real-admin-canary.json

permissions:
  contents: read

concurrency:
  group: drmuscat-isolated-preview-database-write
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Verify exact revision
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$PREVIEW_SOURCE_COMMIT"
          test "$PREVIEW_SOURCE_COMMIT" = "$P05_SOURCE_COMMIT"
          test "$PREVIEW_SOURCE_COMMIT" = "$P06_SOURCE_COMMIT"
          test "$PREVIEW_SOURCE_COMMIT" = "$P07_SOURCE_COMMIT"
          test "$PREVIEW_SOURCE_COMMIT" = "$P09_SOURCE_COMMIT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup pinned Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Validate repository migration, RLS and aligned state contracts
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/preview-migration-sync artifacts/p05 artifacts/p06 artifacts/p07 artifacts/p09
          {
            pnpm db:validate:migrations
            pnpm test:db:rls
            node scripts/import/check-import-readiness-state-alignment.mjs
            node scripts/import/check-import-p05-private-publish-proof.mjs
            node scripts/import/check-import-p06-rollback-authority-proof.mjs
            node scripts/import/check-import-p07-rollback-exact-recovery-proof.mjs
            node scripts/import/check-import-pharmacy-minimal-admin-ui.mjs
            node scripts/import/check-import-p09-real-admin-canary.mjs
          } 2>&1 | tee artifacts/preview-migration-sync/validation.log

      - name: Fail-closed identity preflight
        run: node scripts/db/preview-migration-sync.mjs preflight

      - name: Apply ledger-missing migrations under advisory lock
        run: node scripts/db/run-preview-migration-sync.mjs

      - name: Verify exact ledger and database inventories
        run: node scripts/db/preview-migration-sync.mjs verify

      - name: Run isolated P05 private publish proof
        shell: bash
        run: |
          set -o pipefail
          node scripts/import/run-p05-private-publish-proof.mjs 2>&1 | tee artifacts/p05/hosted-proof.log

      - name: Run isolated P06 atomic rollback authority proof
        shell: bash
        run: |
          set -o pipefail
          node scripts/import/run-p06-rollback-authority-proof.mjs 2>&1 | tee artifacts/p06/hosted-proof.log

      - name: Run isolated P07 exact rollback recovery proof
        shell: bash
        run: |
          set -o pipefail
          node scripts/import/run-p07-rollback-exact-recovery-proof.mjs 2>&1 | tee artifacts/p07/hosted-proof.log

      - name: Run isolated P09 integrated Admin canary proof
        shell: bash
        run: |
          set -o pipefail
          node scripts/import/run-p09-real-admin-canary.mjs 2>&1 | tee artifacts/p09/hosted-proof.log

      - name: Upload Preview migration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-migration-sync-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/preview-migration-sync/
          if-no-files-found: error
          retention-days: 14

      - name: Upload exact-SHA P05 private publish evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p05-private-publish-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/p05/
          if-no-files-found: error
          retention-days: 14

      - name: Upload exact-SHA P06 rollback authority evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p06-rollback-authority-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/p06/
          if-no-files-found: error
          retention-days: 14

      - name: Upload exact-SHA P07 rollback exact recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p07-rollback-exact-recovery-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/p07/
          if-no-files-found: error
          retention-days: 14

      - name: Upload exact-SHA P09 Admin canary evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p09-real-admin-canary-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/p09/
          if-no-files-found: error
          retention-days: 14
