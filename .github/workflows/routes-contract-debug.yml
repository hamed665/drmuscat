name: Routes Contract Debug

on:
  pull_request:
    paths:
      - "scripts/routes-check.mjs"
      - "src/app/**"
      - "src/lib/**"
      - "src/server/**"
      - "docs/seo/**"
      - ".github/workflows/routes-contract-debug.yml"

jobs:
  routes-contract-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge commit
        run: |
          git init . --quiet
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --quiet --depth=1 origin "$GITHUB_SHA"
          git checkout --quiet FETCH_HEAD

      - name: Print hospital route directory entries
        run: |
          find 'src/app/[locale]/[country]/hospitals' -maxdepth 2 -print | sort
          test ! -e 'src/app/[locale]/[country]/hospital'
          test ! -e 'src/app/[locale]/[country]/clinic'
          test ! -e 'src/app/[locale]/[country]/clinics'

      - name: Print route contract failures only
        shell: bash
        run: |
          set +e
          output="$(node scripts/routes-check.mjs 2>&1)"
          status=$?
          printf '%s\n' "$output" | grep '^FAIL:' || true
          exit "$status"
