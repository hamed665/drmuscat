name: SEO Contract Debug

on:
  pull_request:
    paths:
      - "package.json"
      - "scripts/seo/**"
      - "scripts/seo-check.mjs"
      - "scripts/import/**"
      - "src/app/**"
      - "src/lib/**"
      - "src/server/**"
      - "docs/seo/**"
      - "docs/import/**"
      - ".github/workflows/seo-contract-debug.yml"

jobs:
  seo-contract-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge commit
        run: |
          git init . --quiet
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --quiet --depth=1 origin "$GITHUB_SHA"
          git checkout --quiet FETCH_HEAD

      - name: Locate stale hospital sitemap tokens
        run: |
          grep -R -n 'type SupportedImportSitemapEntityType = "doctor" | "pharmacy" | "hospital"' scripts src docs package.json || true
          grep -R -n 'hospital: 500' scripts src docs package.json || true
          grep -R -n '\^\\\\/(en|ar)\\\\/om\\\\/hospitals' scripts src docs package.json || true
          grep -R -n 'must preserve reviewed sitemap token' scripts src docs package.json || true
          grep -R -n 'preserve reviewed sitemap token' scripts src docs package.json || true

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.22.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Print SEO failures only
        shell: bash
        run: |
          set +e
          output="$(pnpm seo:check 2>&1)"
          status=$?
          printf '%s\n' "$output" | grep -E 'FAIL:|failed:|missing|required|must include|must not|Error:' || true
          exit "$status"
